name: Deploy Agentic Processing Platform

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment name"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - uat
          - prod
      location:
        description: "Azure region"
        required: true
        default: "eastus"
        type: string
      cosmos_location:
        description: "Azure region for Cosmos DB"
        required: true
        default: "eastus2"
        type: string
      name_prefix:
        description: "Azure resource name prefix"
        required: true
        default: "taxai"
        type: string
      deploy_foundry_registration:
        description: "Register the Foundry supervisor agent"
        required: true
        default: false
        type: boolean
      foundry_project_endpoint:
        description: "Foundry project endpoint used when agent registration is enabled"
        required: false
        default: ""
        type: string
      foundry_account_name:
        description: "Azure AI Foundry account name used to create the OpenAPI connection"
        required: false
        default: ""
        type: string
      foundry_project_name:
        description: "Azure AI Foundry project name used to create the OpenAPI connection"
        required: false
        default: ""
        type: string
      foundry_model_deployment_name:
        description: "Foundry model deployment name used by the supervisor agent"
        required: false
        default: ""
        type: string
      foundry_openapi_connection_id:
        description: "Optional existing Foundry project connection resource ID for the tool host function key"
        required: false
        default: ""
        type: string
      foundry_openapi_connection_name:
        description: "Foundry project connection name to create/update when connection ID is empty"
        required: false
        default: "w2toolsfnkey"
        type: string
      prepare_foundry_registration_only:
        description: "Prepare resolved Foundry artifacts without remote registration"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  DEPLOY_ENVIRONMENT: ${{ inputs.environment || 'dev' }}
  AZURE_LOCATION: ${{ inputs.location || 'eastus' }}
  AZURE_COSMOS_LOCATION: ${{ inputs.cosmos_location || 'eastus2' }}
  NAME_PREFIX: ${{ inputs.name_prefix || 'taxai' }}
  FOUNDRY_PROJECT_ENDPOINT: ${{ inputs.foundry_project_endpoint || vars.FOUNDRY_PROJECT_ENDPOINT || '' }}
  FOUNDRY_ACCOUNT_NAME: ${{ inputs.foundry_account_name || vars.FOUNDRY_ACCOUNT_NAME || '' }}
  FOUNDRY_PROJECT_NAME: ${{ inputs.foundry_project_name || vars.FOUNDRY_PROJECT_NAME || '' }}
  FOUNDRY_MODEL_DEPLOYMENT_NAME: ${{ inputs.foundry_model_deployment_name || vars.FOUNDRY_MODEL_DEPLOYMENT_NAME || '' }}
  FOUNDRY_OPENAPI_CONNECTION_ID: ${{ inputs.foundry_openapi_connection_id || vars.FOUNDRY_OPENAPI_CONNECTION_ID || '' }}
  FOUNDRY_OPENAPI_CONNECTION_NAME: ${{ inputs.foundry_openapi_connection_name || vars.FOUNDRY_OPENAPI_CONNECTION_NAME || 'w2toolsfnkey' }}
  FOUNDRY_SUPERVISOR_AGENT_ID: ${{ vars.FOUNDRY_SUPERVISOR_AGENT_ID || '' }}
  FOUNDRY_SUPERVISOR_AGENT_NAME: ${{ vars.FOUNDRY_SUPERVISOR_AGENT_NAME || 'foundry-w2-tax-orchestrator' }}
  PORTAL_EXECUTION_MODE: ${{ vars.PORTAL_EXECUTION_MODE || 'direct' }}
  PORTAL_AUTH_ENABLED: ${{ vars.PORTAL_AUTH_ENABLED || 'false' }}
  PORTAL_AUTH_TENANT_ID: ${{ vars.PORTAL_AUTH_TENANT_ID || '' }}
  PORTAL_AUTH_CLIENT_ID: ${{ vars.PORTAL_AUTH_CLIENT_ID || '' }}
  PORTAL_AUTH_SCOPE: ${{ vars.PORTAL_AUTH_SCOPE || '' }}
  PORTAL_AUTH_AUDIENCE: ${{ vars.PORTAL_AUTH_AUDIENCE || '' }}

jobs:
  validate:
    name: Validate Solution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src/foundry_agents/requirements.txt
          python -m pip install -r src/services/w2-intake/requirements.txt
          python -m pip install -r src/services/foundry-tools/requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile Python sources
        run: python -m compileall src tests

      - name: Validate Bicep templates
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r template; do
            echo "Building ${template}"
            az bicep build --file "${template}"
          done < <(find infrastructure/services -path "*/bicep/main.bicep" -type f)

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build W2 upload portal
        shell: bash
        run: |
          set -euo pipefail
          pushd src/apps/w2-upload-portal
          npm install
          VITE_W2_INTAKE_API_URL="https://example.azure-api.net/w2-intake/upload-w2" VITE_W2_PROCESSING_API_URL="https://example.azure-api.net/w2-processing/run" VITE_W2_STATUS_API_URL="https://example.azure-api.net/w2-processing/status" VITE_W2_AGENT_API_URL="https://example.azure-api.net/w2-processing/agent-run" VITE_W2_EXECUTION_MODE="selectable" npm run build
          popd

  package-w2-intake:
    name: Package W2 Intake Function
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deployment package
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build/w2-intake
          mkdir -p build/w2-intake artifacts
          cp -R src/services/w2-intake/. build/w2-intake/
          python -m pip install \
            --upgrade \
            --platform manylinux2014_x86_64 \
            --only-binary=:all: \
            --implementation cp \
            --python-version 3.11 \
            --target build/w2-intake/.python_packages/lib/site-packages \
            -r src/services/w2-intake/requirements.txt
          find build/w2-intake -type d -name "__pycache__" -prune -exec rm -rf {} +
          pushd build/w2-intake
          zip -r ../../artifacts/w2-intake.zip .
          popd

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: w2-intake-package
          path: artifacts/w2-intake.zip

  package-foundry-artifacts:
    name: Package Foundry Agent Artifacts
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Foundry artifact package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/foundry-agent
          cp src/foundry_agents/agent.yaml artifacts/foundry-agent/
          cp src/foundry_agents/eval.yaml artifacts/foundry-agent/
          cp -R src/foundry_agents/prompts artifacts/foundry-agent/prompts
          cp -R src/foundry_agents/tools artifacts/foundry-agent/tools
          cp -R src/foundry_agents/.foundry artifacts/foundry-agent/.foundry
          pushd artifacts
          zip -r foundry-agent-artifacts.zip foundry-agent
          popd

      - name: Upload Foundry artifact package
        uses: actions/upload-artifact@v4
        with:
          name: foundry-agent-artifacts
          path: artifacts/foundry-agent-artifacts.zip

  package-foundry-tools:
    name: Package Foundry Tools Function
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deployment package
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build/foundry-tools
          mkdir -p build/foundry-tools artifacts
          cp -R src/services/foundry-tools/. build/foundry-tools/
          cp -R src/foundry_agents build/foundry-tools/foundry_agents
          python -m pip install \
            --upgrade \
            --platform manylinux2014_x86_64 \
            --only-binary=:all: \
            --implementation cp \
            --python-version 3.11 \
            --target build/foundry-tools/.python_packages/lib/site-packages \
            -r src/services/foundry-tools/requirements.txt
          find build/foundry-tools -type d -name "__pycache__" -prune -exec rm -rf {} +
          pushd build/foundry-tools
          zip -r ../../artifacts/foundry-tools.zip .
          popd

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: foundry-tools-package
          path: artifacts/foundry-tools.zip

  deploy-infrastructure:
    name: Provision Azure Infrastructure
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs:
      - package-w2-intake
      - package-foundry-artifacts
      - package-foundry-tools
    environment: ${{ inputs.environment || 'dev' }}
    outputs:
      w2_intake_function_app_name: ${{ steps.deploy_w2_intake.outputs.function_app_name }}
      w2_intake_api_url: ${{ steps.deploy_w2_intake.outputs.w2_intake_api_url }}
      api_management_name: ${{ steps.deploy_w2_intake.outputs.api_management_name }}
      portal_storage_account_name: ${{ steps.deploy_w2_intake.outputs.portal_storage_account_name }}
      portal_web_endpoint: ${{ steps.deploy_w2_intake.outputs.portal_web_endpoint }}
      service_bus_name: ${{ steps.deploy_w2_intake.outputs.service_bus_name }}
      service_bus_queue_name: ${{ steps.deploy_w2_intake.outputs.service_bus_queue_name }}
      foundry_tools_function_app_name: ${{ steps.deploy_foundry_tools.outputs.function_app_name }}
      foundry_tools_endpoint_base_url: ${{ steps.deploy_foundry_tools.outputs.tool_endpoint_base_url }}
      w2_processing_api_url: ${{ steps.deploy_foundry_tools.outputs.w2_processing_api_url }}
      w2_pipeline_status_api_url: ${{ steps.deploy_foundry_tools.outputs.w2_pipeline_status_api_url }}
      w2_agent_api_url: ${{ steps.deploy_foundry_tools.outputs.w2_agent_api_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Mask deployment identifiers
        shell: bash
        run: |
          echo "::add-mask::${{ vars.AZURE_RESOURCE_GROUP }}"
          echo "::add-mask::${{ env.FOUNDRY_PROJECT_ENDPOINT }}"
          echo "::add-mask::${{ env.FOUNDRY_ACCOUNT_NAME }}"
          echo "::add-mask::${{ env.FOUNDRY_PROJECT_NAME }}"

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --location "${{ env.AZURE_LOCATION }}"

      - name: Preflight Azure infrastructure
        shell: pwsh
        run: |
          ./scripts/azure/Test-AzureDeploymentPreflight.ps1 `
            -ResourceGroupName "${{ vars.AZURE_RESOURCE_GROUP }}" `
            -Environment "${{ env.DEPLOY_ENVIRONMENT }}" `
            -Location "${{ env.AZURE_LOCATION }}" `
            -CosmosLocation "${{ env.AZURE_COSMOS_LOCATION }}" `
            -NamePrefix "${{ env.NAME_PREFIX }}"

      - name: Deploy W2 intake infrastructure
        id: deploy_w2_intake
        shell: bash
        run: |
          set -euo pipefail
          deployment_output="$(az deployment group create \
            --name "w2-intake-${{ env.DEPLOY_ENVIRONMENT }}-${{ github.run_number }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infrastructure/services/w2-intake/bicep/main.bicep \
            --parameters \
              namePrefix="${{ env.NAME_PREFIX }}" \
              environment="${{ env.DEPLOY_ENVIRONMENT }}" \
              location="${{ env.AZURE_LOCATION }}" \
              cosmosLocation="${{ env.AZURE_COSMOS_LOCATION }}" \
              portalAuthEnabled="${{ env.PORTAL_AUTH_ENABLED }}" \
              portalAuthTenantId="${{ env.PORTAL_AUTH_TENANT_ID }}" \
              portalAuthAudience="${{ env.PORTAL_AUTH_AUDIENCE }}" \
            --query "properties.outputs" \
            --output json)"
          function_app_name="$(echo "${deployment_output}" | jq -r '.functionAppName.value')"
          w2_intake_api_url="$(echo "${deployment_output}" | jq -r '.w2IntakeApiUrl.value')"
          api_management_name="$(echo "${deployment_output}" | jq -r '.apiManagementName.value')"
          portal_storage_account_name="$(echo "${deployment_output}" | jq -r '.portalStorageAccountName.value')"
          portal_web_endpoint="$(echo "${deployment_output}" | jq -r '.portalWebEndpoint.value')"
          service_bus_name="$(echo "${deployment_output}" | jq -r '.serviceBusName.value')"
          service_bus_queue_name="$(echo "${deployment_output}" | jq -r '.serviceBusQueueName.value')"
          for required_output in \
            "${function_app_name}" \
            "${w2_intake_api_url}" \
            "${api_management_name}" \
            "${portal_storage_account_name}" \
            "${portal_web_endpoint}" \
            "${service_bus_name}" \
            "${service_bus_queue_name}"; do
            if [[ -z "${required_output}" || "${required_output}" == "null" ]]; then
              echo "A required W2 intake deployment output was empty." >&2
              exit 1
            fi
          done
          echo "function_app_name=${function_app_name}" >> "${GITHUB_OUTPUT}"
          echo "w2_intake_api_url=${w2_intake_api_url}" >> "${GITHUB_OUTPUT}"
          echo "api_management_name=${api_management_name}" >> "${GITHUB_OUTPUT}"
          echo "portal_storage_account_name=${portal_storage_account_name}" >> "${GITHUB_OUTPUT}"
          echo "portal_web_endpoint=${portal_web_endpoint}" >> "${GITHUB_OUTPUT}"
          echo "service_bus_name=${service_bus_name}" >> "${GITHUB_OUTPUT}"
          echo "service_bus_queue_name=${service_bus_queue_name}" >> "${GITHUB_OUTPUT}"

      - name: Deploy Foundry tools infrastructure
        id: deploy_foundry_tools
        shell: bash
        run: |
          set -euo pipefail
          deployment_output="$(az deployment group create \
            --name "foundry-tools-${{ env.DEPLOY_ENVIRONMENT }}-${{ github.run_number }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infrastructure/services/foundry-tools/bicep/main.bicep \
            --parameters \
              namePrefix="${{ env.NAME_PREFIX }}" \
              environment="${{ env.DEPLOY_ENVIRONMENT }}" \
              location="${{ env.AZURE_LOCATION }}" \
              apiManagementName="${{ steps.deploy_w2_intake.outputs.api_management_name }}" \
              portalWebEndpoint="${{ steps.deploy_w2_intake.outputs.portal_web_endpoint }}" \
              serviceBusName="${{ steps.deploy_w2_intake.outputs.service_bus_name }}" \
              serviceBusQueueName="${{ steps.deploy_w2_intake.outputs.service_bus_queue_name }}" \
              foundryProjectEndpoint="${{ env.FOUNDRY_PROJECT_ENDPOINT }}" \
              foundrySupervisorAgentId="${{ env.FOUNDRY_SUPERVISOR_AGENT_ID }}" \
              foundrySupervisorAgentName="${{ env.FOUNDRY_SUPERVISOR_AGENT_NAME }}" \
              portalAuthEnabled="${{ env.PORTAL_AUTH_ENABLED }}" \
              portalAuthTenantId="${{ env.PORTAL_AUTH_TENANT_ID }}" \
              portalAuthAudience="${{ env.PORTAL_AUTH_AUDIENCE }}" \
            --query "properties.outputs" \
            --output json)"
          function_app_name="$(echo "${deployment_output}" | jq -r '.functionAppName.value')"
          tool_endpoint_base_url="$(echo "${deployment_output}" | jq -r '.toolEndpointBaseUrl.value')"
          w2_processing_api_url="$(echo "${deployment_output}" | jq -r '.w2ProcessingApiUrl.value')"
          w2_pipeline_status_api_url="$(echo "${deployment_output}" | jq -r '.w2PipelineStatusApiUrl.value')"
          w2_agent_api_url="$(echo "${deployment_output}" | jq -r '.w2AgentApiUrl.value')"
          for required_output in \
            "${function_app_name}" \
            "${tool_endpoint_base_url}" \
            "${w2_processing_api_url}" \
            "${w2_pipeline_status_api_url}" \
            "${w2_agent_api_url}"; do
            if [[ -z "${required_output}" || "${required_output}" == "null" ]]; then
              echo "A required Foundry tools deployment output was empty." >&2
              exit 1
            fi
          done
          echo "function_app_name=${function_app_name}" >> "${GITHUB_OUTPUT}"
          echo "tool_endpoint_base_url=${tool_endpoint_base_url}" >> "${GITHUB_OUTPUT}"
          echo "w2_processing_api_url=${w2_processing_api_url}" >> "${GITHUB_OUTPUT}"
          echo "w2_pipeline_status_api_url=${w2_pipeline_status_api_url}" >> "${GITHUB_OUTPUT}"
          echo "w2_agent_api_url=${w2_agent_api_url}" >> "${GITHUB_OUTPUT}"

      - name: Grant tool host Foundry project access
        if: ${{ env.FOUNDRY_ACCOUNT_NAME != '' && env.FOUNDRY_PROJECT_NAME != '' }}
        shell: bash
        run: |
          set -euo pipefail
          principal_id="$(az functionapp identity show \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ steps.deploy_foundry_tools.outputs.function_app_name }}" \
            --query principalId \
            --output tsv)"
          if [[ -z "${principal_id}" ]]; then
            echo "Foundry tools Function App managed identity was not found." >&2
            exit 1
          fi
          project_scope="/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ vars.AZURE_RESOURCE_GROUP }}/providers/Microsoft.CognitiveServices/accounts/${{ env.FOUNDRY_ACCOUNT_NAME }}/projects/${{ env.FOUNDRY_PROJECT_NAME }}"
          existing_assignment="$(az role assignment list \
            --assignee "${principal_id}" \
            --role "Foundry Project Manager" \
            --scope "${project_scope}" \
            --query "[0].id" \
            --output tsv)"
          if [[ -z "${existing_assignment}" ]]; then
            az role assignment create \
              --assignee-object-id "${principal_id}" \
              --assignee-principal-type ServicePrincipal \
              --role "Foundry Project Manager" \
              --scope "${project_scope}" \
              --only-show-errors
          fi

  deploy-w2-intake:
    name: Deploy W2 Intake Function App
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: deploy-infrastructure
    environment: ${{ inputs.environment || 'dev' }}

    steps:
      - name: Download W2 intake package
        uses: actions/download-artifact@v4
        with:
          name: w2-intake-package
          path: artifacts

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy function package
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ needs.deploy-infrastructure.outputs.w2_intake_function_app_name }}
          package: artifacts/w2-intake.zip
          scm-do-build-during-deployment: true
          enable-oryx-build: true

  deploy-foundry-tools:
    name: Deploy Foundry Tool Host
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: deploy-infrastructure
    environment: ${{ inputs.environment || 'dev' }}

    steps:
      - name: Download Foundry tools package
        uses: actions/download-artifact@v4
        with:
          name: foundry-tools-package
          path: artifacts

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy function package
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ needs.deploy-infrastructure.outputs.foundry_tools_function_app_name }}
          package: artifacts/foundry-tools.zip
          scm-do-build-during-deployment: true
          enable-oryx-build: true

  deploy-upload-portal:
    name: Deploy W2 Upload Portal
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs:
      - deploy-infrastructure
      - deploy-w2-intake
      - deploy-foundry-tools
    environment: ${{ inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build portal
        shell: bash
        env:
          VITE_W2_INTAKE_API_URL: ${{ needs.deploy-infrastructure.outputs.w2_intake_api_url }}
          VITE_W2_PROCESSING_API_URL: ${{ needs.deploy-infrastructure.outputs.w2_processing_api_url }}
          VITE_W2_STATUS_API_URL: ${{ needs.deploy-infrastructure.outputs.w2_pipeline_status_api_url }}
          VITE_W2_AGENT_API_URL: ${{ needs.deploy-infrastructure.outputs.w2_agent_api_url }}
          VITE_W2_EXECUTION_MODE: ${{ env.PORTAL_EXECUTION_MODE }}
          VITE_AUTH_ENABLED: ${{ env.PORTAL_AUTH_ENABLED }}
          VITE_AUTH_TENANT_ID: ${{ env.PORTAL_AUTH_TENANT_ID }}
          VITE_AUTH_CLIENT_ID: ${{ env.PORTAL_AUTH_CLIENT_ID }}
          VITE_AUTH_SCOPE: ${{ env.PORTAL_AUTH_SCOPE }}
        run: |
          set -euo pipefail
          pushd src/apps/w2-upload-portal
          npm install
          npm run build
          popd

      - name: Publish portal static assets
        shell: bash
        run: |
          set -euo pipefail
          storage_account="${{ needs.deploy-infrastructure.outputs.portal_storage_account_name }}"
          az storage blob service-properties update \
            --account-name "${storage_account}" \
            --static-website \
            --index-document index.html \
            --404-document index.html \
            --auth-mode key \
            --only-show-errors
          az storage blob delete-batch \
            --account-name "${storage_account}" \
            --source '$web' \
            --auth-mode key \
            --only-show-errors || true
          az storage blob upload-batch \
            --account-name "${storage_account}" \
            --destination '$web' \
            --source src/apps/w2-upload-portal/dist \
            --overwrite \
            --auth-mode key \
            --only-show-errors
          echo "Portal static website deployment completed."

  configure-foundry-agent:
    name: Configure Foundry Agent
    runs-on: ubuntu-latest
    needs:
      - deploy-infrastructure
      - deploy-w2-intake
      - deploy-foundry-tools
      - package-foundry-artifacts
    environment: ${{ inputs.environment || 'dev' }}
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_foundry_registration == true }}

    steps:
      - name: Download Foundry artifacts
        uses: actions/download-artifact@v4
        with:
          name: foundry-agent-artifacts
          path: artifacts

      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Foundry registration inputs
        shell: pwsh
        run: |
          $requiredValues = @{
            "FOUNDRY_PROJECT_ENDPOINT" = "${{ env.FOUNDRY_PROJECT_ENDPOINT }}"
            "FOUNDRY_ACCOUNT_NAME" = "${{ env.FOUNDRY_ACCOUNT_NAME }}"
            "FOUNDRY_PROJECT_NAME" = "${{ env.FOUNDRY_PROJECT_NAME }}"
            "FOUNDRY_MODEL_DEPLOYMENT_NAME" = "${{ env.FOUNDRY_MODEL_DEPLOYMENT_NAME }}"
            "foundry_tools_function_app_name" = "${{ needs.deploy-infrastructure.outputs.foundry_tools_function_app_name }}"
            "foundry_tools_endpoint_base_url" = "${{ needs.deploy-infrastructure.outputs.foundry_tools_endpoint_base_url }}"
          }

          foreach ($entry in $requiredValues.GetEnumerator()) {
            if ([string]::IsNullOrWhiteSpace($entry.Value)) {
              throw "Missing required Foundry registration value: $($entry.Key). Verify bootstrap variables and deploy-infrastructure outputs."
            }
          }

      - name: Create or update Foundry OpenAPI connection
        id: ensure_foundry_connection
        if: ${{ env.FOUNDRY_OPENAPI_CONNECTION_ID == '' }}
        shell: pwsh
        run: |
          ./scripts/foundry/Ensure-FoundryOpenApiConnection.ps1 `
            -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" `
            -ResourceGroupName "${{ vars.AZURE_RESOURCE_GROUP }}" `
            -FoundryAccountName "${{ env.FOUNDRY_ACCOUNT_NAME }}" `
            -FoundryProjectName "${{ env.FOUNDRY_PROJECT_NAME }}" `
            -ConnectionName "${{ env.FOUNDRY_OPENAPI_CONNECTION_NAME }}" `
            -FunctionAppName "${{ needs.deploy-infrastructure.outputs.foundry_tools_function_app_name }}" `
            -ToolEndpointBaseUrl "${{ needs.deploy-infrastructure.outputs.foundry_tools_endpoint_base_url }}" `
            -Environment "${{ env.DEPLOY_ENVIRONMENT }}" `
            -OutputDirectory "artifacts/foundry-registration"

      - name: Register Foundry supervisor agent
        id: register_foundry_agent
        shell: pwsh
        run: |
          $registrationArgs = @{
            ProjectEndpoint = "${{ env.FOUNDRY_PROJECT_ENDPOINT }}"
            ModelDeploymentName = "${{ env.FOUNDRY_MODEL_DEPLOYMENT_NAME }}"
            ToolEndpointBaseUrl = "${{ needs.deploy-infrastructure.outputs.foundry_tools_endpoint_base_url }}"
            Environment = "${{ env.DEPLOY_ENVIRONMENT }}"
            OutputDirectory = "artifacts/foundry-registration"
          }

          if ("${{ inputs.prepare_foundry_registration_only }}" -eq "true") {
            $registrationArgs["PrepareOnly"] = $true
          }

          $connectionId = "${{ env.FOUNDRY_OPENAPI_CONNECTION_ID }}"
          if ([string]::IsNullOrWhiteSpace($connectionId)) {
            $connectionId = "${{ steps.ensure_foundry_connection.outputs.openapi_project_connection_id }}"
          }
          $registrationArgs["OpenApiProjectConnectionId"] = $connectionId

          ./scripts/foundry/Register-FoundryAgent.ps1 @registrationArgs

      - name: Update tool host supervisor agent settings
        if: ${{ inputs.prepare_foundry_registration_only == false && steps.register_foundry_agent.outputs.foundry_supervisor_agent_id != '' }}
        shell: bash
        run: |
          set -euo pipefail
          az functionapp config appsettings set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ needs.deploy-infrastructure.outputs.foundry_tools_function_app_name }}" \
            --settings \
              FOUNDRY_SUPERVISOR_AGENT_ID="${{ steps.register_foundry_agent.outputs.foundry_supervisor_agent_id }}" \
              FOUNDRY_SUPERVISOR_AGENT_NAME="${{ env.FOUNDRY_SUPERVISOR_AGENT_NAME }}" \
            --only-show-errors

      - name: Upload Foundry registration artifacts
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: foundry-registration-artifacts
          path: artifacts/foundry-registration

  smoke-test:
    name: Deployment Smoke Test
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs:
      - deploy-infrastructure
      - deploy-w2-intake
      - deploy-foundry-tools
      - deploy-upload-portal
    environment: ${{ inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        if: ${{ env.PORTAL_AUTH_ENABLED == 'true' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run W2 end-to-end smoke test
        shell: pwsh
        env:
          SMOKE_INTAKE_API_URL: ${{ needs.deploy-infrastructure.outputs.w2_intake_api_url }}
          SMOKE_STATUS_API_URL: ${{ needs.deploy-infrastructure.outputs.w2_pipeline_status_api_url }}
          SMOKE_PORTAL_ENDPOINT: ${{ needs.deploy-infrastructure.outputs.portal_web_endpoint }}
        run: |
          Write-Output "::add-mask::$env:SMOKE_INTAKE_API_URL"
          Write-Output "::add-mask::$env:SMOKE_STATUS_API_URL"
          Write-Output "::add-mask::$env:SMOKE_PORTAL_ENDPOINT"

          $bearerToken = ""
          if ("${{ env.PORTAL_AUTH_ENABLED }}" -eq "true") {
            $smokeTokenScope = "${{ env.PORTAL_AUTH_AUDIENCE }}/.default"
            if ([string]::IsNullOrWhiteSpace("${{ env.PORTAL_AUTH_AUDIENCE }}")) {
              throw "PORTAL_AUTH_ENABLED is true, but PORTAL_AUTH_AUDIENCE is empty. Rerun bootstrap with -EnableUploadPortalAuthentication."
            }
            $bearerToken = az account get-access-token `
              --scope $smokeTokenScope `
              --query accessToken `
              --output tsv
          }
          if ("${{ env.PORTAL_AUTH_ENABLED }}" -eq "true" -and [string]::IsNullOrWhiteSpace($bearerToken)) {
            throw "PORTAL_AUTH_ENABLED is true, but GitHub Actions could not acquire a smoke-test access token. Rerun bootstrap with -EnableUploadPortalAuthentication so the GitHub service principal receives the W-2 smoke-test app role."
          }

          ./scripts/azure/Test-W2EndToEndSmoke.ps1 `
            -IntakeApiUrl $env:SMOKE_INTAKE_API_URL `
            -StatusApiUrl $env:SMOKE_STATUS_API_URL `
            -BearerToken $bearerToken

          Write-Host "W2 upload portal smoke test completed."
